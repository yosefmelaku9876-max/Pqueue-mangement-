<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Queue Status | Smart PQMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Live Queue</h1></header>
    <nav>
        <a href="index.html">Home</a>
        <a href="registration.html">Registration</a>
        <a href="Queue.html">Queue No</a>

    <section class="hero-small">
        <h2>Live Queue Status</h2>
        <p>Monitor real-time patient serving and waiting lists.</p>
    </section>
    <div class="container">
        <div class="queue-display"><h3>Serving</h3><div class="queue-number" id="servingNo">---</div></div>
        <div class="queue-display"><h3>Next</h3><div class="queue-number" id="nextNo">---</div></div>
        <h3>Full Waiting List</h3>
        <table id="patientTable">
            <thead><tr><th>Token</th><th>Patient Name</th><th>Category</th><th>Status</th></tr></thead>
            <tbody id="queueListBody"></tbody>
        </table>
        <br>
        <button onclick="updateQueue()">Update Queue</button>
    </div>
