<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Smart PQMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Patient Registration</h1></header>
    <nav>
        <a href="index.html">Home</a>
        <a href="registration.html">Registration</a>
        <a href="Queue.html">Queue No</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <section class="hero-small">
        <h2>Patient Registration</h2>
        <p>Enter patient details to join the live waiting queue.</p>
    </section>
    <div class="container">
        <form id="regForm">
            <div class="form-group"><label>First Name</label><input type="text" id="fname" placeholder="Enter full name" required></div>
            <div class="form-group"><label>Age</label><input type="number" id="age" placeholder="Enter age" min="1" max="120" required></div>
            <div class="form-group">
                <label>Category (Triage)</label>
                <select id="category" required>
                    <option value="">-- Select Category --</option>
                    <option value="Normal">Normal Patient</option>
                    <option value="Emergency">Emergency Patient</option>
                </select>
            </div>
            <button type="submit">Get Queue Token</button>
        </form>
        <div id="tokenOutput"></div>
    </div>
    <footer>
        <p>I am : Yosef Melaku  my first website</p>
        <p>&copy; All rights reserved</p>
    </footer>
    <script src="reg_val.js"></script>
    <script src="queue_val.js"></script>
</body>
</html>
